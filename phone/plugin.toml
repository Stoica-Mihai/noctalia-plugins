id = "mcs/phone"
name = "Phone"
version = "0.5.1"
author = "MCS"
description = "Phone via KDE Connect: battery in the bar, click to ring or open files"
license = "MIT"
min_noctalia = "5.0.0"
plugin_api = 3
tags = ["phone", "kdeconnect", "battery", "files"]
icon = "device-mobile"

[[widget]]
id = "phone"
entry = "widget.luau"

[[widget.setting]]
key = "show_percent"
type = "bool"
label_key = "settings.show_percent.label"
description_key = "settings.show_percent.description"
default = true

[[widget.setting]]
key = "click_action"
type = "select"
label_key = "settings.click_action.label"
description_key = "settings.click_action.description"
default = "files"
options = [
  { value = "files", label_key = "settings.click_action.files" },
  { value = "ring", label_key = "settings.click_action.ring" },
]

[[widget.setting]]
key = "storage_subpath"
type = "string"
label_key = "settings.storage_subpath.label"
description_key = "settings.storage_subpath.description"
default = "storage/emulated/0"

[[widget.setting]]
key = "notify_low"
type = "bool"
label_key = "settings.notify_low.label"
description_key = "settings.notify_low.description"
default = true

[[widget.setting]]
key = "notify_received"
type = "bool"
label_key = "settings.notify_received.label"
description_key = "settings.notify_received.description"
default = true

[[widget.setting]]
key = "low_threshold"
type = "int"
label_key = "settings.low_threshold.label"
description_key = "settings.low_threshold.description"
default = 15
min = 5
max = 50

[[widget.setting]]
key = "hide_when_absent"
type = "bool"
label_key = "settings.hide_when_absent.label"
description_key = "settings.hide_when_absent.description"
default = true
