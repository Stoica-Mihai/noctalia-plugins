id = "mcs/bluetooth-count"
name = "Bluetooth Count"
version = "0.3.0"
author = "MCS"
description = "Bluetooth glyph with an always-visible connected-device count"
license = "MIT"
min_noctalia = "5.0.0"
plugin_api = 3
tags = ["bluetooth", "indicator"]
icon = "bluetooth-connected"

[[widget]]
id = "count"
entry = "widget.luau"

[[widget.setting]]
key = "notify_events"
type = "bool"
label_key = "settings.notify_events.label"
description_key = "settings.notify_events.description"
default = true

[[widget.setting]]
key = "show_zero"
type = "bool"
label_key = "settings.show_zero.label"
description_key = "settings.show_zero.description"
default = false

[[widget.setting]]
key = "hide_when_off"
type = "bool"
label_key = "settings.hide_when_off.label"
description_key = "settings.hide_when_off.description"
default = false
