id = "mcs/nethome"
name = "NetHome AC"
version = "0.5.0"
author = "MCS"
description = "Midea AC via NetHome Plus: status in the bar, control panel for power/mode/temperature (LAN-only after one-time login)"
license = "MIT"
min_noctalia = "5.0.0"
plugin_api = 3
tags = ["iot", "ac", "midea", "nethome"]
icon = "snowflake"

[[widget]]
id = "nethome"
entry = "widget.luau"

[[panel]]
id = "controls"
entry = "panel.luau"
width = 320
placement = "attached"
open_near_click = true

[[widget.setting]]
key = "account"
type = "string"
label_key = "settings.account.label"
description_key = "settings.account.description"
default = ""

[[widget.setting]]
key = "password"
type = "string"
label_key = "settings.password.label"
description_key = "settings.password.description"
default = ""

[[widget.setting]]
key = "show_temp"
type = "bool"
label_key = "settings.show_temp.label"
description_key = "settings.show_temp.description"
default = true

[[widget.setting]]
key = "hide_when_absent"
type = "bool"
label_key = "settings.hide_when_absent.label"
description_key = "settings.hide_when_absent.description"
default = true

[[widget.setting]]
key = "poll_interval"
type = "int"
label_key = "settings.poll_interval.label"
description_key = "settings.poll_interval.description"
default = 30
min = 10
max = 300
