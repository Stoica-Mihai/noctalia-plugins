id = "mcs/wallpaper-weather"
name = "Weather Wallpaper"
version = "0.1.0"
author = "MCS"
description = "Wallpaper follows the weather outside — picks from your folders per condition"
license = "MIT"
min_noctalia = "5.0.0"
tags = ["wallpaper", "weather", "ambient"]
icon = "cloud"

[[service]]
id = "sync"
entry = "service.luau"

[[setting]]
key = "wallpapers_dir"
type = "folder"
label_key = "settings.wallpapers_dir.label"
description_key = "settings.wallpapers_dir.description"
default = "~/Pictures/weather-wallpapers"

[[setting]]
key = "check_minutes"
type = "int"
label_key = "settings.check_minutes.label"
description_key = "settings.check_minutes.description"
default = 5
min = 1
max = 60

[[setting]]
key = "rotate_within_condition"
type = "bool"
label_key = "settings.rotate_within_condition.label"
description_key = "settings.rotate_within_condition.description"
default = false
