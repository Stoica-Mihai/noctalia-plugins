id = "mcs/mouse-battery"
name = "Mouse Battery"
version = "0.1.0"
author = "MCS"
description = "Keychron mouse battery level over raw HID (standalone, needs python3)"
license = "MIT"
min_noctalia = "5.0.0"
tags = ["hardware", "battery", "mouse"]
icon = "mouse-2"

[[widget]]
id = "battery"
entry = "widget.luau"

[[widget.setting]]
key = "poll_seconds"
type = "int"
label_key = "settings.poll_seconds.label"
description_key = "settings.poll_seconds.description"
default = 60
min = 5
max = 600

[[widget.setting]]
key = "show_percent"
type = "bool"
label_key = "settings.show_percent.label"
description_key = "settings.show_percent.description"
default = true
