id = "mcs/mouse-battery"
name = "Battery Monitor"
version = "0.3.0"
author = "MCS"
description = "Peripheral battery monitor: upower devices + Keychron mouse over raw HID"
license = "MIT"
min_noctalia = "5.0.0"
plugin_api = 3
tags = ["hardware", "battery", "mouse", "controller", "bluetooth"]
icon = "battery-3"

[[widget]]
id = "battery"
entry = "widget.luau"

[[widget.setting]]
key = "poll_seconds"
type = "int"
label_key = "settings.poll_seconds.label"
description_key = "settings.poll_seconds.description"
default = 60
min = 5
max = 600

[[widget.setting]]
key = "show_percent"
type = "bool"
label_key = "settings.show_percent.label"
description_key = "settings.show_percent.description"
default = true

[[widget.setting]]
key = "notify_low"
type = "bool"
label_key = "settings.notify_low.label"
description_key = "settings.notify_low.description"
default = true

[[widget.setting]]
key = "low_threshold"
type = "int"
label_key = "settings.low_threshold.label"
description_key = "settings.low_threshold.description"
default = 20
min = 5
max = 50
